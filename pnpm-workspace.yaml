packages:
  - ".pkgs/*"
  - "apps/*"
  - "packages/*"
  - "packages/*/*"
  - "examples/*"
allowBuilds:
  dprint: true
  esbuild: true
  msgpackr-extract: true
minimumReleaseAgeExclude:
  - "@effect/platform-node-shared@4.0.0-beta.85"
  - "@effect/platform-node@4.0.0-beta.85"
  - effect@4.0.0-beta.85
onlyBuiltDependencies:
  - core-js
  - dprint
  - esbuild
  - msgpackr-extract
overrides:
  "esbuild": "^0.28.1"
  "tslib": "^2.8.1"
  "typescript": "^6.0.3"
  "undici": "^8.5.0"

# trustPolicy: "no-downgrade"
