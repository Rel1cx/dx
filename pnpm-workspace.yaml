packages:
  - ".pkgs/*"
  - "apps/*"
  - "packages/*"
  - "packages/*/*"
  - "examples/*"
allowBuilds:
  dprint: true
  esbuild: true
  msgpackr-extract: true
minimumReleaseAgeExclude:
  - eslint-plugin-jsdoc@63.0.9 || 63.0.10 || 63.0.11
  - eslint-plugin-regexp@3.1.1
  - eslint@10.6.0
  - "@es-joy/jsdoccomment@0.88.0"
onlyBuiltDependencies:
  - core-js
  - dprint
  - esbuild
  - msgpackr-extract
overrides:
  "esbuild": "^0.28.1"
  "tslib": "^2.8.1"
  "typescript": "^6.0.3"
  "undici": "^8.7.0"
